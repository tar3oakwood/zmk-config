CONFIG_ZMK_KEYBOARD_NAME="Gravity36_R"
CONFIG_ZMK_BLE=y

CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

# 内蔵RGB LEDウィジェットを完全に有効化
CONFIG_RGBLED_WIDGET=y

# Bluetoothプロファイル（接続先）ごとの色を定義
# 設定値の真後ろにはコメントを書かないようにします
CONFIG_RGBLED_WIDGET_BT_COLOR_1=4
CONFIG_RGBLED_WIDGET_BT_COLOR_2=2
CONFIG_RGBLED_WIDGET_BT_COLOR_3=1

# (オプション) 必要に応じてバッテリーやレイヤー表示をオフにしたい場合
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=n
